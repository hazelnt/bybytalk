<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>bybytalk</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  display:flex;
  height:100vh;
  background:#eef3fb;
  overflow:hidden;
}

#sidebar{
  width:240px;
  background:#1565c0;
  color:white;
  padding:15px;
}

#main{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#header{
  background:white;
  padding:12px 16px;
  border-bottom:1px solid #ddd;
  display:flex;
  justify-content:space-between;
}

#login{text-align:center;margin:auto;}
#login input{
  display:block;
  margin:10px auto;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  background:#1976d2;
  color:white;
  cursor:pointer;
}

#chat{
  display:none;
  flex:1;
  flex-direction:column;
  overflow:hidden;
}

#messages{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding:15px;
}

.row{display:flex;margin:6px 0;}
.row.me{justify-content:flex-end;}

.msg{
  max-width:360px;
  padding:10px 14px;
  border-radius:14px;
  position:relative;
  word-wrap:break-word;
  font-size: 13px;
}

.me .msg{
  background:#1976d2;
  color:rgb(6, 0, 0);
}

.other .msg{
  background:white;
}

.replyBox{
  font-size:12px;
  opacity:0.7;
  border-left:3px solid #1976d2;
  padding-left:6px;
  margin-bottom:5px;
}

.name{
  font-size:11px;
  opacity:0.6;
  margin-bottom:3px;
}

.menu{
  position:absolute;
  top:5px;
  right:8px;
  cursor:pointer;
  font-weight:bold;
}

.dropdown{
  position:absolute;
  top:25px;
  right:0;
  background:white;
  border:1px solid #ddd;
  border-radius:8px;
  display:none;
  z-index:1000;
}

.dropdown div{
  padding:8px;
  cursor:pointer;
}
.dropdown div:hover{background:#eee;}

#replyPreview{
  display:none;
  padding:8px;
  background:#f1f1f1;
  border-left:4px solid #1976d2;
  font-size:13px;
  margin:5px 10px;
  border-radius:8px;
}

#inputArea{
  display:flex;
  padding:10px;
  border-top:1px solid #ddd;
  background:white;
}

#msg{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<div id="sidebar">
  <h3>⭐ Starred</h3>
  <div id="starList"></div>
</div>

<div id="main">

<div id="header">
  bybytalk
  <div style="position:relative;">
    <button id="menuBtn" onclick="toggleMenu()">⋮</button>
    <div id="topMenu" style="display:none;position:absolute;right:0;top:35px;background:white;border:1px solid #ddd;border-radius:8px;">
      <div onclick="clearChat()">🗑 Clear Chat</div>
      <div onclick="logout()">🚪 Logout</div>
    </div>
  </div>
</div>

<div id="login">
  <input id="username" placeholder="username">
  <input id="password" type="password" placeholder="password">
  <button onclick="login()">Login</button>
</div>

<div id="chat">
  <div id="messages"></div>

  <!-- REPLY PREVIEW -->
  <div id="replyPreview">
    <span id="replyText"></span>
    <button onclick="cancelReply()" style="float:right;">❌</button>
  </div>

  <div id="inputArea">
    <input id="msg" placeholder="Type message">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

</div>
<!-- SEMUA CODE KAMU SAMA, SCROLL KE BAGIAN JS -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getDatabase, ref, push, onValue, get, remove, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyDWwa1l-DF4Z8wsznoSLtwGi3IWGAjuLTQ",
  databaseURL:"https://bybytalk-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = getDatabase(app);

const loginEl = document.getElementById("login");
const chatEl = document.getElementById("chat");
const sidebarEl = document.getElementById("sidebar");
const menuBtnEl = document.getElementById("menuBtn");
const messagesEl = document.getElementById("messages");
const starList = document.getElementById("starList");
const msgInput = document.getElementById("msg");

let stars = JSON.parse(localStorage.getItem("stars")||"[]");
let replyTarget = null;

/* ENTER SEND */
msgInput.addEventListener("keypress",(e)=>{
  if(e.key==="Enter") sendMsg();
});

/* LOGIN */
window.login = async ()=>{
  const u = username.value.trim().toLowerCase();
  const p = password.value.trim();

  const snap = await get(ref(db,"users"));
  if(!snap.exists()) return alert("users kosong");

  let ok=false;
  const data = snap.val();

  for(const k in data){
    const user=data[k];
    if(typeof user==="object"){
      if(user.username?.toLowerCase()===u && user.password===p) ok=true;
    }else{
      if(k.toLowerCase()===u && user===p) ok=true;
    }
  }

  if(ok){
    localStorage.setItem("user",u);
    loginEl.style.display="none";
    chatEl.style.display="flex";
    sidebarEl.style.display="block";
    menuBtnEl.style.display="inline-block";
    load();

    updateStar(); // 🔥 TAMBAHAN
  }else alert("Wrong login");
};

/* SEND */
window.sendMsg = ()=>{
  const text = msgInput.value;
  if(!text) return;

  push(ref(db,"chatroom"),{
    name:localStorage.getItem("user"),
    message:text,
    reply: replyTarget || null,
    time:Date.now()
  });

  msgInput.value="";
  cancelReply();
};

/* LOAD */
function load(){
  onValue(ref(db,"chatroom"),snap=>{
    const isBottom = messagesEl.scrollTop + messagesEl.clientHeight >= messagesEl.scrollHeight - 5;

    messagesEl.innerHTML="";
    const me = localStorage.getItem("user");

    Object.entries(snap.val()||{}).forEach(([id,m])=>{
      const row=document.createElement("div");
      row.className="row "+(m.name===me?"me":"other");

      const bubble=document.createElement("div");
      bubble.className="msg";

      const menu=document.createElement("div");
      menu.className="menu";
      menu.innerText="⋮";

      const drop=document.createElement("div");
      drop.className="dropdown";

      if(m.name===me){
        drop.innerHTML=`
          <div onclick="replyMsg('${m.message}')">↩ Reply</div>
          <div onclick="star('${id}','${m.message}')">⭐ Star</div>
          <div onclick="editMsg('${id}','${m.message}',${m.time})">✏️ Edit</div>
          <div onclick="del('${id}')">🗑 Delete</div>
        `;
      }else{
        drop.innerHTML=`
        <div onclick="replyMsg('${m.message}')">↩ Reply</div>
        <div onclick="star('${id}','${m.message}')">⭐ Star</div>
        `;
      }

      menu.onclick=()=> drop.style.display = drop.style.display==="block"?"none":"block";

      bubble.append(menu,drop);

      if(m.reply){
        const r=document.createElement("div");
        r.className="replyBox";
        r.innerHTML = "<b>Reply:</b> " + m.reply;
        bubble.appendChild(r);
      }

      if(m.name!==me){
        const n=document.createElement("div");
        n.className="name";
        n.innerText=m.name;
        bubble.appendChild(n);
      }

      const text=document.createElement("div");
      text.innerText=m.message;
      bubble.appendChild(text);

      row.appendChild(bubble);
      messagesEl.appendChild(row);
    });

    if(isBottom){
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    updateStar();
  });
}

/* REPLY */
window.replyMsg = (text)=>{
  replyTarget = text;
  document.getElementById("replyPreview").style.display = "block";
  document.getElementById("replyText").innerText = text;
};

window.cancelReply = ()=>{
  replyTarget = null;
  document.getElementById("replyPreview").style.display = "none";
};

/* STAR */
window.star=(id,text)=>{
  if(!stars.find(s=>s.id===id)){
    stars.push({id,text});
    localStorage.setItem("stars",JSON.stringify(stars));
    updateStar();
  }
};

/* 🔥 FIX UTAMA ADA DI SINI */
function updateStar(){
  if(!starList) return;

  stars = JSON.parse(localStorage.getItem("stars")||"[]"); // 🔥 TAMBAHAN

  starList.innerHTML="";
  stars.forEach((s,i)=>{
    const d=document.createElement("div");
    d.style.display="flex";
    d.style.justifyContent="space-between";

    const t=document.createElement("span");
    t.innerText=s.text;

    const b=document.createElement("button");
    b.innerText="❌";
    b.onclick=()=>{
      stars.splice(i,1);
      localStorage.setItem("stars",JSON.stringify(stars));
      updateStar();
    };

    d.append(t,b);
    starList.appendChild(d);
  });
}

/* DELETE */
window.del=async(id)=>{
  const snap=await get(ref(db,"chatroom/"+id));
  if(snap.val()?.name!==localStorage.getItem("user")){
    alert("Tidak bisa hapus pesan orang lain");
    return;
  }
  remove(ref(db,"chatroom/"+id));
};

/* EDIT */
window.editMsg=(id,old,time)=>{
  if(Date.now()-time>15*60*1000) return alert("Expired");
  const n=prompt("Edit:",old);
  if(!n) return;
  update(ref(db,"chatroom/"+id),{message:n});
};

/* MENU */
window.toggleMenu=()=>{
  topMenu.style.display = topMenu.style.display==="block"?"none":"block";
};
window.clearChat=()=> remove(ref(db,"chatroom"));
window.logout=()=>{
  localStorage.removeItem("user");
  location.reload();
};

/* AUTO LOGIN */
window.addEventListener("DOMContentLoaded", ()=>{
  if(localStorage.getItem("user")){
    loginEl.style.display="none";
    chatEl.style.display="flex";
    sidebarEl.style.display="block";
    menuBtnEl.style.display="inline-block";
    load();

    updateStar(); // 🔥 TAMBAHAN
  }else{
    sidebarEl.style.display="none";
    menuBtnEl.style.display="none";
  }
});
</script>
</body>
</html>
